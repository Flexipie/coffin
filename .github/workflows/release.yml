name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # macOS runner: the darwin builds need cgo for the concealed
    # clipboard helper; linux builds are CGO_ENABLED=0 cross-builds.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
